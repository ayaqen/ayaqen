name: Profile metrics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - README.md
      - .github/workflows/metrics.yml
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Profile metrics, topics, and achievements
        uses: gh-metrics/metrics@4b1c3eb0b801b3fe1821352c4f5f9329d09f4ebf
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ayaqen
          filename: metrics.svg

          base: header
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_limit: 5
          plugin_discussions: yes

          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: mastered
          plugin_topics_sort: starred

          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0

          config_display: large
          config_timezone: America/Detroit
          output_action: commit
          output_condition: data-changed
          plugins_errors_fatal: yes
          use_prebuilt_image: no
