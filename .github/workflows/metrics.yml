name: Metrics
on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  github-metrics-personal:
    runs-on: ubuntu-latest
    steps:
      - name: 🦑 Personal metrics
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@v3
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ayaqen
          base: header
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, gnuplot, vue, scala, ejs
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: no
          plugin_languages_limit: 4
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: no
          plugin_discussions: yes
          config_order: base.header, isocalendar, languages, habits, discussions
          output_action: commit

      - name: 🦑 Topics (icon wall)
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@v3
        with:
          filename: metrics.topics.mastered.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ayaqen
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_sort: stars
          plugin_topics_mode: icons
          config_display: large
          output_action: commit

      - name: 🦑 Notable contributions
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@v3
        with:
          filename: metrics.plugin.notable.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ayaqen
          base: ""
          plugin_notable: yes
          plugin_notable_types: commit, pull_request
          config_display: large
          output_action: commit
